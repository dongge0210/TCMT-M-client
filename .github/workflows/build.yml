name: Build TCMT-M

on:
  #push:
    #branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-windows:
    name: Windows (MSBuild + CUDA)
    runs-on: windows-2025

    env:
      SOLUTION_FILE_PATH: TCMT.sln
      BUILD_CONFIGURATION: Release
      BUILD_PLATFORM: x64

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Cache CUDA
      id: cache-cuda
      uses: actions/cache/restore@v4
      with:
        path: C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA
        key: cuda-13.2.0
        restore-keys: |
          cuda-13.2-

    - name: Check CUDA exists
      id: check-cuda
      run: |
        if (Test-Path "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.2\bin\nvcc.exe") {
          Write-Host "CUDA found"
          echo "cuda_found=true" >> $env:GITHUB_OUTPUT
        } elseif (Test-Path "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.2.0\bin\nvcc.exe") {
          Write-Host "CUDA found at v13.2.0"
          echo "cuda_found=true" >> $env:GITHUB_OUTPUT
        } else {
          Write-Host "CUDA not found"
          echo "cuda_found=false" >> $env:GITHUB_OUTPUT
        }

    - name: Setup CUDA 13.2
      if: steps.check-cuda.outputs.cuda_found != 'true'
      uses: Jimver/cuda-toolkit@v0.2.35
      with:
        cuda: '13.2.0'

    - name: Set CUDA_PATH
      run: |
        $env:CUDA_PATH = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.2"
        if (!(Test-Path "$env:CUDA_PATH\bin\nvcc.exe")) {
          $env:CUDA_PATH = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.2.0"
        }
        if (!(Test-Path "$env:CUDA_PATH\bin\nvcc.exe")) {
          $env:CUDA_PATH = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.1.0"
        }
        if (Test-Path "$env:CUDA_PATH\bin\nvcc.exe") {
          echo "CUDA_PATH=$env:CUDA_PATH" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "CUDA_PATH=$env:CUDA_PATH"
        } else {
          Write-Host "Warning: CUDA not found, setting empty path"
          echo "CUDA_PATH=" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        }

    - name: Save CUDA cache
      if: steps.check-cuda.outputs.cuda_found != 'true'
      uses: actions/cache/save@v4
      with:
        path: C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA
        key: cuda-13.2.0

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v3

    - name: Cache .NET tools
      uses: actions/cache@v5
      with:
        path: ~/.dotnet/tools
        key: dotnet-tools-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}

    - name: Setup Visual Studio environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Setup .NET Framework
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore NuGet packages
      run: nuget restore ${{ env.SOLUTION_FILE_PATH }}

    - name: Build CPP-parsers
      run: |
        msbuild src/CPP-parsers/CPP-parsers/CPP-parsers.vcxproj /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /p:WindowsTargetPlatformVersion=10.0 /m

    - name: Build AvaloniaUI
      run: |
        cd AvaloniaUI
        dotnet build TCMT.Avalonia.csproj -c Release

    - name: Build main project
      run: |
        msbuild ${{ env.SOLUTION_FILE_PATH }} /p:Configuration=${{ env.BUILD_CONFIGURATION }} /p:Platform=${{ env.BUILD_PLATFORM }} /p:PlatformToolset=v143 /p:WindowsTargetPlatformVersion=10.0 /p:LangVersion=preview /m

    - name: Upload build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: TCMT-Windows-x64-Release
        path: |
          x64/${{ env.BUILD_CONFIGURATION }}/*.exe
          x64/${{ env.BUILD_CONFIGURATION }}/*.dll
          x64/${{ env.BUILD_CONFIGURATION }}/*.pdb

  build-macos:
    name: macOS (CMake + Clang)
    runs-on: macos-14

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Install dependencies
      run: brew install ncurses

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: |
        cmake --build build -j$(sysctl -n hw.ncpu)

    - name: Upload build artifact
      uses: actions/upload-artifact@v7
      with:
        name: TCMT-macOS-arm64-Release
        path: build/src/TCMT-M

  release-alpha:
    name: Alpha Release
    if: github.event_name == 'workflow_dispatch'
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest

    steps:
    - name: Download Windows artifact
      uses: actions/download-artifact@v7
      with:
        name: TCMT-Windows-x64-Release
        path: artifacts/windows

    - name: Download macOS artifact
      uses: actions/download-artifact@v7
      with:
        name: TCMT-macOS-arm64-Release
        path: artifacts/macos

    - name: Package artifacts
      run: |
        cd artifacts
        chmod +x macos/TCMT-M
        zip -r TCMT-Windows-x64-alpha.zip windows/
        zip -r TCMT-macOS-arm64-alpha.zip macos/

    - name: Generate alpha tag
      id: tag
      run: |
        TAG="alpha-$(date -u +%Y%m%d-%H%M%S)-${GITHUB_RUN_ID}"
        echo "tag=$TAG" >> $GITHUB_OUTPUT

    - name: Create Alpha Release
      uses: softprops/action-gh-release@46306abe601df0f59c9fea99b2f95e701f65b3d3  # v2.2.2
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        name: Alpha ${{ steps.tag.outputs.tag }}
        body: |
          ## 🚧 Alpha Build

          **Commit**: ${{ github.sha }}
          **Branch**: ${{ github.ref_name }}
          **Run**: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          自动构建产物，仅供测试。
        draft: false
        prerelease: true
        files: |
          artifacts/TCMT-Windows-x64-alpha.zip
          artifacts/TCMT-macOS-arm64-alpha.zip